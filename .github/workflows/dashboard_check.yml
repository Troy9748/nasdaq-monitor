name: Dashboard Build

on:
  workflow_dispatch:
  schedule:
    # 北京时间周二至周六 07:20，NASDAQ 数据更新后兜底刷新网页。
    - cron: "20 23 * * 1-5"
    # 北京时间交易日 16:20，A股板块指数收盘更新后兜底刷新网页。
    - cron: "20 8 * * 1-5"
    # 北京时间交易日 22:45，基金净值更新后兜底刷新网页。
    - cron: "45 14 * * 1-5"
  workflow_run:
    workflows: ["Daily NASDAQ-100 Check", "Daily Holdings Sector Check", "Daily Fund Holdings Check"]
    types: [completed]
  push:
    branches: [main]
    paths:
      - "web/**"

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: Build static GitHub Pages site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /nasdaq-monitor
        run: pnpm run build:pages
      - run: pnpm run test:pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
