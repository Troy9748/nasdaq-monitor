name: Daily Holdings Sector Check

on:
  push:
    branches: [main]
    paths:
      - "sector_monitor.py"
      - ".github/workflows/sector_check.yml"
  schedule:
    # 北京时间工作日 16:10 首次更新，18:10 再补一次晚到数据；脚本会跳过重复交易日。
    - cron: "10 8 * * 1-5"
    - cron: "10 10 * * 1-5"
  workflow_dispatch:

concurrency:
  group: holdings-sector-daily
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Update sector data and analysis (no email)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || secrets.OPENAI_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-v4-flash' }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || vars.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
        run: python -u sector_monitor.py ${{ github.event_name == 'push' && '--force' || '' }}
      - name: Commit a new market day
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sector_indices_daily.csv web/public/data/sector_indices_daily.csv web/public/data/sectors.json web/public/data/sector_analysis.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: holdings sector indices"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
