name: Daily NASDAQ-100 Check

on:
  schedule:
    # UTC 周一至周五 23:00 = 北京时间周二至周六 07:00。
    - cron: "0 23 * * 1-5"
    # 北京时间周一 06:00 执行 FRED 全量校准，不发送邮件。
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "重新生成 AI 分析和网页数据（不发邮件）"
        type: boolean
        default: false
      force_email:
        description: "强制完整分析并发送一封测试邮件"
        type: boolean
        default: false

concurrency:
  group: nasdaq100-daily
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update data, analysis and email
        timeout-minutes: 5
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL || vars.OPENAI_BASE_URL }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
          ALERT_VXN_LEVEL: ${{ vars.ALERT_VXN_LEVEL }}
          ALERT_BREADTH_LEVEL: ${{ vars.ALERT_BREADTH_LEVEL }}
          ALERT_VOLATILITY_LEVEL: ${{ vars.ALERT_VOLATILITY_LEVEL }}
          ALERT_EMA_DISTANCE: ${{ vars.ALERT_EMA_DISTANCE }}
        run: python -u monitor.py ${{ github.event.schedule == '0 22 * * 0' && '--refresh-fred --force --no-email' || github.event.schedule == '0 23 * * 1-5' && '--scheduled-email' || inputs.force_email && '--force' || inputs.force_refresh && '--force --no-email' || '' }}

      - name: Commit new market day
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nasdaq100_daily_data.csv market_context_daily.csv web/public/data/
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: NASDAQ-100 market data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
