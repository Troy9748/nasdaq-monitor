name: Daily Market Check

on:
  schedule:
    # 每天 UTC 23:00 (北京时间 07:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run monitor script
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: |
          python monitor.py

      # --- 更新 CSV 提交逻辑 ---
      - name: Commit and Push CSV
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 注意：这里改成了新的文件名 market_daily_data.csv
          git add market_daily_data.csv
          
          # 检查变化并提交
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Market Data CSV" && git push)
