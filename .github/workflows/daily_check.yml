name: Daily Nasdaq Check

on:
  schedule:
    # 每天 UTC 23:00 (北京时间 07:00)
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许手动运行

jobs:
  build:
    runs-on: ubuntu-latest
    
    # 这一步是为了给 git 提交赋予权限
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run monitor script
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVER: ${{ secrets.MAIL_RECEIVER }}
        run: |
          python monitor.py

      # --- 新增步骤：将 CSV 提交回仓库 ---
      - name: Commit and Push CSV
        run: |
          # 1. 配置 Git 机器人身份
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 2. 添加生成的 CSV 文件
          git add nasdaq_daily_data.csv
          
          # 3. 检查是否有变化 (如果没有新数据就不提交，避免报错)
          # 如果有变化，提交并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Daily Nasdaq Data CSV" && git push)
